<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nirnay</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>

<body>
  <!-- ✅ FIXED: removed "pages/" -->
  <iframe id="app-frame" title="Nirnay App" src="nirnay.html"></iframe>

  <script>
    (function () {
      // ✅ FIXED: removed "pages/" from all routes
      var routes = {
        login: "login.html",
        signup: "signup.html",
        dashboard: "dashboard.html",
        upload: "nirnay-upload.html",
        decisiontree: "decisiontree.html",
        "nirnay-upload": "nirnay-upload.html",
        nirnay: "nirnay.html",
        team: "team.html"
      };

      var frame = document.getElementById("app-frame");

      function getRouteFromHash() {
        var hash = window.location.hash || "#upload";
        return hash.replace(/^#/, "").trim().toLowerCase();
      }

      function setPageFromHash() {
        var key = getRouteFromHash();
        var target = routes[key] || routes.upload;

        // Prevent unnecessary reload loop
        if (frame.getAttribute("src") !== target) {
          frame.setAttribute("src", target);
        }
      }

      window.addEventListener("hashchange", setPageFromHash);

      // Initial load
      setPageFromHash();
    })();
  </script>
</body>
</html>
